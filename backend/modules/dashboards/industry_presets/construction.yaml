industry: construction
# CraneStack — construction. Projects, POs, crews, equipment.
dashboards:
  - name: "Site Dashboard"
    slug: "home"
    is_default: true
    widgets:
      - widget_type: kpi
        title: "Active Projects"
        data_source: "projects.active_projects_count"
        position: 0
      - widget_type: kpi
        title: "Open Material POs"
        data_source: "purchasing.open_pos_count"
        position: 1
      - widget_type: kpi
        title: "Outstanding Billing"
        data_source: "invoicing.outstanding_total"
        position: 2
      - widget_type: kpi
        title: "Crew Size"
        data_source: "hr.active_employees"
        position: 3
      - widget_type: line
        title: "Revenue (90d)"
        data_source: "invoicing.revenue_daily"
        config:
          period: "last_90_days"
        position: 4
      - widget_type: bar
        title: "Spend by Vendor"
        data_source: "purchasing.spend_by_vendor"
        config:
          limit: 10
        position: 5
      - widget_type: pie
        title: "Tasks by Status"
        data_source: "projects.tasks_by_status"
        position: 6
      - widget_type: bar
        title: "Crew by Department"
        data_source: "hr.employees_by_department"
        position: 7
