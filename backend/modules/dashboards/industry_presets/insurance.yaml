industry: insurance
# TrustGuard — insurance. Policies, claims, underwriting.
dashboards:
  - name: "Underwriting Dashboard"
    slug: "home"
    is_default: true
    widgets:
      - widget_type: kpi
        title: "Active Policies"
        data_source: "sales.open_orders_count"
        position: 0
      - widget_type: kpi
        title: "Open Claims"
        data_source: "helpdesk.open_tickets_count"
        position: 1
      - widget_type: kpi
        title: "Premium Outstanding"
        data_source: "invoicing.outstanding_total"
        position: 2
      - widget_type: kpi
        title: "Active Agents"
        data_source: "hr.active_employees"
        position: 3
      - widget_type: line
        title: "Premium Revenue (90d)"
        data_source: "invoicing.revenue_daily"
        config:
          period: "last_90_days"
        position: 4
      - widget_type: pie
        title: "Claims by Priority"
        data_source: "helpdesk.tickets_by_priority"
        position: 5
      - widget_type: bar
        title: "Top Policyholders"
        data_source: "sales.top_customers"
        config:
          limit: 10
        position: 6
      - widget_type: bar
        title: "Policies by Status"
        data_source: "sales.orders_by_status"
        position: 7
