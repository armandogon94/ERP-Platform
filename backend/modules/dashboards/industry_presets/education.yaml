industry: education
# EduPulse — education. Students, enrollments, instructors, tuition.
dashboards:
  - name: "Campus Overview"
    slug: "home"
    is_default: true
    widgets:
      - widget_type: kpi
        title: "Classes Today"
        data_source: "calendar.events_today"
        position: 0
      - widget_type: kpi
        title: "Active Enrollments"
        data_source: "sales.open_orders_count"
        position: 1
      - widget_type: kpi
        title: "Outstanding Tuition"
        data_source: "invoicing.outstanding_total"
        position: 2
      - widget_type: kpi
        title: "Instructors & Staff"
        data_source: "hr.active_employees"
        position: 3
      - widget_type: line
        title: "Tuition Revenue (90d)"
        data_source: "invoicing.revenue_daily"
        config:
          period: "last_90_days"
        position: 4
      - widget_type: bar
        title: "Staff by Department"
        data_source: "hr.employees_by_department"
        position: 5
      - widget_type: bar
        title: "Top Families by Billing"
        data_source: "sales.top_customers"
        config:
          limit: 5
        position: 6
      - widget_type: bar
        title: "Classes This Week"
        data_source: "calendar.events_this_week"
        position: 7
